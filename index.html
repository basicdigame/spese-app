<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker Spese</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #2a2a3a;
    }

    .card h2 {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* MESE SELECTOR */
    .month-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .month-selector button {
      background: #2a2a3a;
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .month-selector button:hover { background: #3a3a55; }

    #month-label {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 140px;
      text-align: center;
    }

    /* TOTALE */
    .total-box {
      text-align: center;
      padding: 10px 0 4px;
    }

    .total-box .amount {
      font-size: 2.4rem;
      font-weight: 800;
      color: #7c6ff7;
    }

    .total-box .label {
      color: #666;
      font-size: 0.8rem;
      margin-top: 2px;
    }

    /* CATEGORIE */
    .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .cat-item {
      background: #12121a;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #2a2a3a;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-name {
      font-size: 0.8rem;
      color: #aaa;
      font-weight: 500;
    }

    .cat-amount {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .cat-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cat-controls button {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .btn-minus { background: #2a2a3a; color: #fff; }
    .btn-plus  { background: #7c6ff7; color: #fff; }
    .btn-minus:hover { background: #3a3a55; }
    .btn-plus:hover  { background: #6a5de0; }

    .cat-input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      padding: 4px 8px;
      width: 100%;
      text-align: center;
    }

    .cat-input:focus { outline: none; border-color: #7c6ff7; }

    /* GRAFICO */
    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* CONFRONTO MESI */
    .compare-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .compare-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .compare-month {
      font-size: 0.78rem;
      color: #888;
      width: 60px;
      flex-shrink: 0;
    }

    .compare-bar-wrap {
      flex: 1;
      background: #12121a;
      border-radius: 6px;
      height: 18px;
      overflow: hidden;
    }

    .compare-bar {
      height: 100%;
      border-radius: 6px;
      background: #7c6ff7;
      transition: width 0.5s ease;
      min-width: 2px;
    }

    .compare-val {
      font-size: 0.78rem;
      color: #ccc;
      width: 60px;
      text-align: right;
      flex-shrink: 0;
    }

    /* AGGIUNGI SPESA */
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .add-form select,
    .add-form input {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      padding: 12px 14px;
    }

    .add-form select:focus,
    .add-form input:focus { outline: none; border-color: #7c6ff7; }

    .add-form button {
      background: #7c6ff7;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover { background: #6a5de0; }

    /* LISTA TRANSAZIONI */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }

    .tx-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #12121a;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #2a2a3a;
    }

    .tx-left { display: flex; align-items: center; gap: 10px; }

    .tx-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tx-info .tx-cat { font-size: 0.75rem; color: #888; }
    .tx-info .tx-desc { font-size: 0.9rem; font-weight: 500; }

    .tx-right { display: flex; align-items: center; gap: 10px; }
    .tx-amount { font-weight: 700; font-size: 0.95rem; }

    .tx-delete {
      background: none;
      border: none;
      color: #444;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
      padding: 2px 6px;
    }

    .tx-delete:hover { color: #e05555; }

    .empty { color: #555; text-align: center; padding: 20px; font-size: 0.9rem; }

    /* BILANCIO */
    .balance-box {
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      gap: 10px;
    }
    .balance-item { text-align: center; }
    .balance-item .bal-label { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
    .balance-item .bal-val { font-size: 1.3rem; font-weight: 800; }
    .bal-green { color: #22c55e; }
    .bal-red   { color: #ef4444; }
    .bal-white { color: #fff; }

    /* ENTRATE CLIENTI */
    .client-list { display: flex; flex-direction: column; gap: 10px; }

    .client-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #12121a;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #2a2a3a;
      transition: border-color 0.2s;
      cursor: pointer;
      gap: 12px;
    }

    .client-item.paid   { border-color: #22c55e44; }
    .client-item.unpaid { border-color: #ef444433; }

    .client-left { display: flex; align-items: center; gap: 12px; flex: 1; }

    .check-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #3a3a55;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .client-item.paid .check-circle {
      background: #22c55e;
      border-color: #22c55e;
    }

    .client-name { font-weight: 600; font-size: 0.95rem; }
    .client-status {
      font-size: 0.72rem;
      margin-top: 2px;
    }
    .client-item.paid   .client-status { color: #22c55e; }
    .client-item.unpaid .client-status { color: #888; }

    .client-amount { font-weight: 800; font-size: 1.1rem; color: #22c55e; }

    .entrate-total {
      text-align: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #2a2a3a;
      font-size: 0.8rem;
      color: #888;
    }
    .entrate-total span { color: #22c55e; font-weight: 700; font-size: 1rem; }

    @media (max-width: 400px) {
      .categories { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h1>💸 Tracker Spese</h1>
<p class="subtitle">Tieni tutto sotto controllo</p>

<!-- MESE -->
<div class="month-selector">
  <button onclick="changeMonth(-1)">‹</button>
  <span id="month-label"></span>
  <button onclick="changeMonth(1)">›</button>
</div>

<!-- BILANCIO RAPIDO -->
<div class="card">
  <div class="balance-box">
    <div class="balance-item">
      <div class="bal-label">Entrate attese</div>
      <div class="bal-val bal-green" id="bal-entrate">€0</div>
    </div>
    <div class="balance-item">
      <div class="bal-label">Uscite</div>
      <div class="bal-val bal-red" id="bal-uscite">€0</div>
    </div>
    <div class="balance-item">
      <div class="bal-label">Saldo</div>
      <div class="bal-val bal-white" id="bal-saldo">€0</div>
    </div>
  </div>
</div>

<!-- ENTRATE CLIENTI -->
<div class="card">
  <h2>Entrate clienti</h2>
  <div class="client-list" id="client-list"></div>
  <div class="entrate-total">
    Incassato: <span id="entrate-incassato">€0</span> su <span id="entrate-totale" style="color:#aaa">€1.900</span>
  </div>
</div>

<!-- CATEGORIE RAPIDE -->
<div class="card">
  <h2>Categorie</h2>
  <div class="categories" id="cat-grid"></div>
</div>

<!-- GRAFICO TORTA -->
<div class="card">
  <h2>Distribuzione</h2>
  <div class="chart-wrap">
    <canvas id="pie-chart"></canvas>
  </div>
</div>

<!-- CONFRONTO MESI -->
<div class="card">
  <h2>Confronto ultimi 6 mesi</h2>
  <div class="compare-grid" id="compare-grid"></div>
</div>

<!-- AGGIUNGI SPESA -->
<div class="card">
  <h2>Aggiungi spesa</h2>
  <div class="add-form">
    <select id="add-cat">
      <option value="">Seleziona categoria</option>
    </select>
    <input type="text" id="add-desc" placeholder="Descrizione (es. Supermercato)" />
    <input type="number" id="add-amount" placeholder="Importo in €" min="0" step="0.01" />
    <button onclick="addTransaction()">+ Aggiungi</button>
  </div>
</div>

<!-- LISTA TRANSAZIONI -->
<div class="card">
  <h2>Movimenti del mese</h2>
  <div class="tx-list" id="tx-list"></div>
</div>

<script>
const CLIENTS = [
  { name: 'Massimiliano',  amount: 700 },
  { name: 'DesenzanoLoft', amount: 700 },
  { name: 'SecondsOut',    amount: 500 },
];

const TOTAL_ENTRATE = CLIENTS.reduce((s, c) => s + c.amount, 0);

function clientKey(y, m) { return `clienti_${y}_${m}`; }

function loadClients(y, m) {
  return JSON.parse(localStorage.getItem(clientKey(y, m)) || '{}');
}

function saveClients(y, m, data) {
  localStorage.setItem(clientKey(y, m), JSON.stringify(data));
}

function toggleClient(name) {
  const data = loadClients(currentYear, currentMonth);
  data[name] = !data[name];
  saveClients(currentYear, currentMonth, data);
  render();
}

function renderClients() {
  const paid = loadClients(currentYear, currentMonth);
  const list = document.getElementById('client-list');
  list.innerHTML = CLIENTS.map(c => {
    const isPaid = !!paid[c.name];
    return `
      <div class="client-item ${isPaid ? 'paid' : 'unpaid'}" onclick="toggleClient('${c.name}')">
        <div class="client-left">
          <div class="check-circle">${isPaid ? '✓' : ''}</div>
          <div>
            <div class="client-name">${c.name}</div>
            <div class="client-status">${isPaid ? 'Pagato ✓' : 'In attesa...'}</div>
          </div>
        </div>
        <div class="client-amount">€${c.amount}</div>
      </div>`;
  }).join('');

  const incassato = CLIENTS.filter(c => paid[c.name]).reduce((s, c) => s + c.amount, 0);
  document.getElementById('entrate-incassato').textContent = '€' + incassato.toLocaleString('it-IT');
  document.getElementById('entrate-totale').textContent = '€' + TOTAL_ENTRATE.toLocaleString('it-IT');
}

function renderBalance(spese) {
  const paid = loadClients(currentYear, currentMonth);
  const incassato = CLIENTS.filter(c => paid[c.name]).reduce((s, c) => s + c.amount, 0);
  const saldo = incassato - spese;
  document.getElementById('bal-entrate').textContent = '€' + TOTAL_ENTRATE.toLocaleString('it-IT');
  document.getElementById('bal-uscite').textContent = '€' + spese.toFixed(2).replace('.', ',');
  const saldoEl = document.getElementById('bal-saldo');
  saldoEl.textContent = (saldo >= 0 ? '+' : '') + '€' + saldo.toFixed(2).replace('.', ',');
  saldoEl.className = 'bal-val ' + (saldo >= 0 ? 'bal-green' : 'bal-red');
}

const CATS = [
  { name: 'Cibo',                  color: '#f97316' },
  { name: 'Abbonamenti',           color: '#7c6ff7' },
  { name: 'Benzina',               color: '#22c55e' },
  { name: 'Assicurazione motorino',color: '#3b82f6' },
  { name: 'Altro',                 color: '#ec4899' },
];

const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let now = new Date();
let currentYear  = now.getFullYear();
let currentMonth = now.getMonth();

let pieChart = null;

// ── Storage ──────────────────────────────────────────────
function storageKey(y, m) { return `spese_${y}_${m}`; }

function loadData(y, m) {
  return JSON.parse(localStorage.getItem(storageKey(y, m)) || '[]');
}

function saveData(y, m, data) {
  localStorage.setItem(storageKey(y, m), JSON.stringify(data));
}

// ── Helpers ───────────────────────────────────────────────
function fmt(n) { return '€' + n.toFixed(2).replace('.', ','); }

function catColor(name) {
  return (CATS.find(c => c.name === name) || {color:'#888'}).color;
}

function monthTotal(y, m) {
  return loadData(y, m).reduce((s, t) => s + t.amount, 0);
}

// ── Render ────────────────────────────────────────────────
function render() {
  document.getElementById('month-label').textContent =
    MONTHS[currentMonth] + ' ' + currentYear;

  const data = loadData(currentYear, currentMonth);
  const total = data.reduce((s, t) => s + t.amount, 0);

  renderClients();
  renderBalance(total);
  renderCatGrid(data);
  renderPie(data);
  renderCompare();
  renderTxList(data);
}

function renderCatGrid(data) {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  CATS.forEach(cat => {
    const catTotal = data.filter(t => t.cat === cat.name)
                         .reduce((s, t) => s + t.amount, 0);
    const el = document.createElement('div');
    el.className = 'cat-item';
    el.innerHTML = `
      <div class="cat-header">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <span class="cat-name">${cat.name}</span>
      </div>
      <div class="cat-amount" style="color:${cat.color}">${fmt(catTotal)}</div>
      <div class="cat-controls">
        <button class="btn-minus" onclick="quickAdd('${cat.name}',-1)">−</button>
        <input class="cat-input" type="number" id="quick-${cat.name}"
               placeholder="€" min="0" step="1"
               onkeydown="if(event.key==='Enter') quickAdd('${cat.name}',1)" />
        <button class="btn-plus" onclick="quickAdd('${cat.name}',1)">+</button>
      </div>`;
    grid.appendChild(el);
  });
}

function quickAdd(catName, sign) {
  const input = document.getElementById('quick-' + catName);
  const val = parseFloat(input.value);
  if (!val || val <= 0) return;
  const data = loadData(currentYear, currentMonth);
  if (sign > 0) {
    data.push({ id: Date.now(), cat: catName, desc: catName, amount: val });
  } else {
    const idx = [...data].reverse().findIndex(t => t.cat === catName);
    if (idx !== -1) data.splice(data.length - 1 - idx, 1);
  }
  saveData(currentYear, currentMonth, data);
  input.value = '';
  render();
}

function renderPie(data) {
  const ctx = document.getElementById('pie-chart').getContext('2d');
  const totals = CATS.map(c => data.filter(t => t.cat === c.name).reduce((s,t)=>s+t.amount,0));
  const hasData = totals.some(v => v > 0);

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: CATS.map(c => c.name),
      datasets: [{
        data: hasData ? totals : [1],
        backgroundColor: hasData ? CATS.map(c => c.color) : ['#2a2a3a'],
        borderWidth: 0,
        hoverOffset: 8,
      }]
    },
    options: {
      cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#aaa', font: { size: 11 }, padding: 12, boxWidth: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => hasData ? ` ${fmt(ctx.parsed)}` : ' Nessuna spesa'
          }
        }
      }
    }
  });
}

function renderCompare() {
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = '';
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = currentMonth - i;
    let y = currentYear;
    while (m < 0) { m += 12; y--; }
    months.push({ y, m, total: monthTotal(y, m) });
  }
  const max = Math.max(...months.map(x => x.total), 1);
  months.forEach(({ y, m, total }) => {
    const pct = (total / max * 100).toFixed(1);
    const isActive = (y === currentYear && m === currentMonth);
    const row = document.createElement('div');
    row.className = 'compare-row';
    row.innerHTML = `
      <span class="compare-month">${MONTHS[m].slice(0,3)} ${y !== currentYear ? y : ''}</span>
      <div class="compare-bar-wrap">
        <div class="compare-bar" style="width:${pct}%;${isActive?'background:#f97316':''}"></div>
      </div>
      <span class="compare-val">${fmt(total)}</span>`;
    grid.appendChild(row);
  });
}

function renderTxList(data) {
  const list = document.getElementById('tx-list');
  if (data.length === 0) {
    list.innerHTML = '<div class="empty">Nessuna spesa registrata</div>';
    return;
  }
  list.innerHTML = [...data].reverse().map(t => `
    <div class="tx-item">
      <div class="tx-left">
        <div class="tx-dot" style="background:${catColor(t.cat)}"></div>
        <div class="tx-info">
          <div class="tx-cat">${t.cat}</div>
          <div class="tx-desc">${t.desc}</div>
        </div>
      </div>
      <div class="tx-right">
        <span class="tx-amount" style="color:${catColor(t.cat)}">${fmt(t.amount)}</span>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
      </div>
    </div>`).join('');
}

// ── Actions ───────────────────────────────────────────────
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  render();
}

function addTransaction() {
  const cat    = document.getElementById('add-cat').value;
  const desc   = document.getElementById('add-desc').value.trim();
  const amount = parseFloat(document.getElementById('add-amount').value);
  if (!cat || !amount || amount <= 0) {
    alert('Seleziona categoria e inserisci un importo valido.');
    return;
  }
  const data = loadData(currentYear, currentMonth);
  data.push({ id: Date.now(), cat, desc: desc || cat, amount });
  saveData(currentYear, currentMonth, data);
  document.getElementById('add-cat').value = '';
  document.getElementById('add-desc').value = '';
  document.getElementById('add-amount').value = '';
  render();
}

function deleteTransaction(id) {
  const data = loadData(currentYear, currentMonth).filter(t => t.id !== id);
  saveData(currentYear, currentMonth, data);
  render();
}

// ── Init ──────────────────────────────────────────────────
const addCatSel = document.getElementById('add-cat');
CATS.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c.name;
  opt.textContent = c.name;
  addCatSel.appendChild(opt);
});

render();
</script>
</body>
</html>
